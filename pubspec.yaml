name: briluxforge
description: "Briluxforge — Multi-API AI router with intelligent task delegation."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Serialization
  json_annotation: ^4.9.0

  # Security & Storage
  flutter_secure_storage: ^9.0.0
  drift: ^2.22.0
  sqlite3_flutter_libs: ^0.5.0
  shared_preferences: ^2.3.0
  path_provider: ^2.1.0

  # Networking
  http: ^1.2.0

  # Auth & Licensing
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0

  # UI
  flutter_markdown: ^0.7.0
  flutter_svg: ^2.0.0
  highlight: ^0.7.0
  url_launcher: ^6.3.0
  google_fonts: ^6.2.0

  # Utility
  uuid: ^4.4.0
  equatable: ^2.0.0
  path: ^1.9.0
  markdown: ^7.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0
  json_serializable: ^6.8.0
  drift_dev: ^2.22.0

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/brain/
    - assets/images/onboarding/
